name: Verify C++ Assignment

on:
  push:
  workflow_dispatch:

jobs:
  compile-and-check-output:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Compile program
        run: g++ -std=c++17 -Wall -Wextra -pedantic decimal_conversion.cpp -o decimal_conversion
      - name: Generate output
        run: ./decimal_conversion > generated_output.txt
      - name: Verify submitted output
        run: diff -u sample_output.txt generated_output.txt
